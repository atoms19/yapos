version: "3.8"
services:
  yapos_app:
    build: .
    restart: always
    environment: 
      - NODE_ENV=production

  nginx:
    image: nginx:alpine
    restart: always
    ports: 
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - yapos_app

